services:
  - type: web
    name: medical-frontend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: API_UPSTREAM_URL
        sync: false
    autoDeploy: false
    routes:
      - path: /
        destination: /
