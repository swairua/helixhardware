<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Helix General Hardware</title>
    <meta name="description" content="Trusted supplier of general hardware and supplies" />
    <meta name="theme-color" content="#2563eb" />

    <!-- Open Graph / Facebook (will be updated dynamically) -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="/assets/helix-logo.png" />
    <meta property="og:image:width" content="800" />

    <!-- Twitter (will be updated dynamically) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/assets/helix-logo.png" />

    <!-- Favicon and PWA Icons -->
    <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180x180.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="true" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Helix Hardware" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

    <!-- Additional SEO -->
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
  </head>
